name = "rag-chatbot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[vectorize]]
binding = "VECTORIZE"
index_name = "msbai-index"

[ai]
binding = "AI"

# ANTHROPIC_API_KEY is a secret — set via: wrangler secret put ANTHROPIC_API_KEY
# Never put real keys here.
